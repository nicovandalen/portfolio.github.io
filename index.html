<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nico van Dalen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Rinter is not on Google Fonts. Closest available alternative with similar geometric character: -->
  <!-- Using Inter as a stand-in — see note below on linking Rinter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="icon" href="FAV.png" type="image/x-icon" />
  <style>
      .lang-switcher {
        margin-top: 28px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .lang {
  font-size: 10pt;
  letter-spacing: 0.08em;
  cursor: pointer;
  color: #aaa;
  text-transform: uppercase;
  transition: color 0.2s;
}

.lang.active {
  color: #000;
}

.lang-divider {
  font-size: 10pt;
  color: #aaa;
}

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #f4f4f4;
      color: #000;
    }

 @font-face {
      font-family: 'Rinter';
      src: url('fonts/Rinter-Regular.woff2') format('woff2'),
           url('fonts/Rinter-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
    }
      
    body {
      font-family: 'Rinter', sans-serif;
    }

    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      min-height: 100vh;
    }

    /* ── LEFT COLUMN ── */
    .sidebar {
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
    }

    .sidebar h1 {
      font-size: 32pt;
      font-weight: 400;
      line-height: 1.1;
        margin-bottom: 8px;
    }

    .sidebar .subtitle {
      font-size: 12pt;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.2;
      color: #000;
    }

    .sidebar .archive-block {
      margin-top: 28px;
    }

    .sidebar .archive-block p {
      font-size: 12pt;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.2;
        margin-bottom: 10px;
    }

    .sidebar .archive-block a {
      font-size: 12pt;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #000;
      text-decoration: underline;
    }

    .sidebar .contact-block {
      margin-top: 28px;
    }

    .sidebar .web-block p {
      font-size: 10pt;
      font-weight: 400;
      letter-spacing: 0.01em;
      line-height: 1.2;
      color: #000;
      text-decoration: none;
      display: block;
        margin-top: 10px;
      }

    .sidebar .contact-block a {
      font-size: 10pt;
      font-weight: 400;
      letter-spacing: 0.01em;
      line-height: 1.2;
      color: #000;
      text-decoration: none;
      display: block;
    }

    /* ── RIGHT COLUMN (image) ── */
.image-area {
  position: relative;
  overflow: hidden;
  height: 100vh;
}

      .image-area img {
          width: 100%;
          height: 100%;
        object-fit: cover;
        display: block;
        transform: scale(1.05);
        transform-origin: center center;
          object-position: 71% center;
      }

    /* Placeholder shown when no real image is set */
    .image-placeholder {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-placeholder span {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
    }

.img-mobile {
  display: none !important;
}

@media (max-width: 768px) {
  .layout {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

.img-desktop {
  display: none !important;
}

.img-mobile {
  display: block !important;
  object-position: 90% 90%; /* adjust these to pan the image */
}

  .image-area {
    order: 1;
    height: 56vh;
    min-height: 300px;
    width: 100%;
  }

  .sidebar {
    order: 2;
    padding: 36px 36px 56px;
  }
}

  </style>
    
</head>
<body>
  <div class="layout">

    <aside class="sidebar">    
      <h1>Nico van Dalen</h1>

<p class="subtitle">
  <span data-nl="Grafisch Ontwerper" data-en="Graphic Designer">Grafisch Ontwerper</span><br>
  <span data-nl="Visuele Identiteit &amp; Systemen" data-en="Visual Identity">Visuele Identiteit</span>
</p>

<div class="archive-block">
  <p>
    <span data-nl="Digitaal Archief &amp; Portfolio" data-en="Digital Archive &amp; Portfolio">Digitaal Archief &amp; Portfolio</span><br>
    <span data-nl="In Ontwikkeling" data-en="In Development">In Ontwikkeling</span>
  </p>
    <a id="portfolio-link" href="PORTFOLIO_NL.pdf" target="_blank">
        <span data-nl="Bekijk Portfolio als PDF" data-en="View Portfolio as PDF">Bekijk Portfolio als PDF</span>
    </a>
</div>

<div class="contact-block">
  <a href="mailto:iam@nicovandalen.com">iam@nicovandalen.com</a>
  <a href="tel:+31622035556">+31 06 22035556</a>
</div>

<div class="web-block">
  <p>www.nicovandalen.com<br>Boxmeer, NL</p>
</div>

<div class="lang-switcher">
  <span id="lang-nl" class="lang active" onclick="setLang('nl')">NL</span>
  <span class="lang-divider">|</span>
  <span id="lang-en" class="lang" onclick="setLang('en')">EN</span>
</div>

    </aside>

    <main class="image-area">
        <img class="img-desktop" src="MUUR.jpg" alt="Portfolio overview" />
        <img class="img-mobile" src="MUUR_MOB.jpg" alt="Portfolio overview" />
    </main>

  </div>

<script>
  function setLang(lang) {
    document.querySelectorAll('[data-nl]').forEach(el => {
      el.innerHTML = el.getAttribute('data-' + lang);
    });
    document.getElementById('lang-nl').classList.toggle('active', lang === 'nl');
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    document.getElementById('portfolio-link').href = lang === 'nl' ? 'PORTFOLIO_NL.pdf' : 'PORTFOLIO_EN.pdf';
  }
</script>

</body>
</html>
